<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Request - ALUG@UCI VPS Services</title>
        <link rel="stylesheet" href="styles.css">
        <script src="core.js"></script>
        <script src="request/request.js"></script>
    </head>

    <body>
        <div class="vertical-container">
            <h1>Request a VPS</h1>
            <p>To request a VPS, please fill out the short answer form below:</p>
            <textarea id="answer" required rows="10" cols="50"></textarea>
            <br>
            <small id="counter">Characters (300 minimum and 1000 maximum): 0</small>
            <br>
            <button type="button" id="submit">Submit Request</button>
            <br>
            <button type="button" id="logout">Logout</button>
        </div>
    </body>
</html>
