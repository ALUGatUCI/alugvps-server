<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Confirm Account - ALUG@UCI VPS Services</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="core.js"></script>
        <script src="confirm/confirm.js"></script>
    </head>

    <body>
        <div class="vertical-container">
            <h1>Account Confirmation</h1>
            <p>Please check your email for a verification code. Then enter it below to confirm your account.</p>

            <input id="confirm-code" type="text" placeholder="Confirmation Code">
            <br>
            <button id="submit" type="button">Confirm</button>
            <br>
            <button id="resend" type="button">Resend</button>
            <br>
            <button type="button" id="logout">Logout</button>
        </div>
    </body>
