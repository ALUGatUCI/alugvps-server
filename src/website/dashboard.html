<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard - ALUG@UCI VPS Services</title>
        <link rel="stylesheet" href="styles.css">
        <script src="core.js"></script>
        <script src="dashboard/dashboard.js"></script>
    </head>

    <body>
        <div class="vertical-container">
            <h1>Dashboard</h1>
            <p>Welcome to your dashboard! Here you can manage your VPS.</p>
            <p>SSH Address: <span id="sshAddress"></span></p> <!-- Placeholder for SSH address -->

            <h2>Actions</h2>
            <p>Container Status: <span id="containerStatus">Unknown</span></p>
            <button type="button" id="start">Start VPS</button>
            <button type="button" id="stop">Stop VPS</button>
            <button type="button" id="reboot">Reboot VPS</button>

            <h2>Resource Usage</h2>
            <p>CPU Usage: <span id="cpuUsage">0%</span></p>
            <p>Memory Usage: <span id="memoryUsage">0%</span></p>
            <p>Storage Usage: <span id="storageUsage">0%</span></p>
        </div>
    </body>
</html>
